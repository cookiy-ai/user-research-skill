name: Release skill.zip

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build user-research-cookiy-skill.zip
        run: zip -r user-research-cookiy-skill.zip SKILL.md references

      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest skill build
          files: user-research-cookiy-skill.zip
          prerelease: false
          make_latest: "true"
